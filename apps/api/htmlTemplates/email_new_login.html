<!DOCTYPE html>
<html>
<head>
    <title>New Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>New Login detected</h1>
        <p>Hello {{username}},</p>
        <p>We detected a new login from a different device. If this was you, please ignore this message.</p>
        <p>If this was not you, please change your password immediately.</p>
        <p>Thank you!</p>
    </div>
</body>
</html>
