name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_API_URL_FRONT: ${{ vars.NEXT_PUBLIC_API_URL_FRONT }}
  NEXT_PUBLIC_API_AUTH_TOKEN: ${{ vars.NEXT_PUBLIC_API_AUTH_TOKEN }}

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      - run: npx nx record -- echo Starting CI run
       # Run tests in parallel across all projects
      - run: npx nx run-many -t test --all --parallel
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: npx nx fix-ci
        if: always()
